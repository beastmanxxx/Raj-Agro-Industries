    // Build Sidebar
    function buildSidebar() {
      const nav = document.getElementById('sidebar-nav');
      let html = '';
      NAV_CONFIG.forEach(item => {
        if (item.type === 'section') {
          html += `<div class="sidebar-section"><div class="sidebar-section-title">${item.label}</div></div>`;
        } else {
          html += `<div class="sidebar-item${currentSection === item.id ? ' active' : ''}" data-section="${item.id}" onclick="selectSection('${item.id}')"><i class="fas ${item.icon}"></i>${item.label}</div>`;
        }
      });
      nav.innerHTML = html;
    }

    function selectSection(id) {
      currentSection = id;
      buildSidebar();
      renderSection();
      document.getElementById('page-title').textContent = NAV_CONFIG.find(n => n.id === id)?.label || 'Dashboard';
    }

    // Toast
    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => t.className = 'toast', 3000);
    }

    // Load Content
    // Password management
    async function loadAdminPassword() {
      try {
        const doc = await db.collection('adminSettings').doc('password').get();
        if (doc.exists && doc.data().password) {
          localStorage.setItem('adminPassword', doc.data().password);
        }
      } catch(e) { console.warn('Could not load admin password from Firebase'); }
    }
    async function changeAdminPassword() {
      const currentPw = document.getElementById('current-pw').value;
      const newPw = document.getElementById('new-pw').value;
      const confirmPw = document.getElementById('confirm-pw').value;
      const storedPw = localStorage.getItem('adminPassword') || 'raj@123';
      if (!currentPw || !newPw || !confirmPw) { showToast('Please fill in all fields', true); return; }
      if (currentPw !== storedPw) { showToast('Current password is incorrect', true); return; }
      if (newPw.length < 4) { showToast('New password must be at least 4 characters', true); return; }
      if (newPw !== confirmPw) { showToast('New passwords do not match', true); return; }
      try {
        await db.collection('adminSettings').doc('password').set({ password: newPw });
        localStorage.setItem('adminPassword', newPw);
        showToast('Password updated successfully!');
        document.getElementById('current-pw').value = '';
        document.getElementById('new-pw').value = '';
        document.getElementById('confirm-pw').value = '';
      } catch(e) {
        // If Firebase fails, save locally
        localStorage.setItem('adminPassword', newPw);
        showToast('Password saved locally (Firebase unavailable)');
        document.getElementById('current-pw').value = '';
        document.getElementById('new-pw').value = '';
        document.getElementById('confirm-pw').value = '';
      }
    }

    async function loadContent() {
      try {
        await loadAdminPassword();
        const doc = await db.collection('siteContent').doc('main').get();
        siteContent = doc.exists ? doc.data() : JSON.parse(JSON.stringify(DEFAULT_CONTENT));
        document.getElementById('status-dot').className = 'status-dot connected';
        document.getElementById('status-text').textContent = 'Connected';
        buildSidebar();
        renderSection();
        showToast('Content loaded successfully!');
      } catch (e) {
        console.error(e);
        siteContent = JSON.parse(JSON.stringify(DEFAULT_CONTENT));
        document.getElementById('status-dot').className = 'status-dot disconnected';
        document.getElementById('status-text').textContent = 'Offline — using defaults';
        buildSidebar();
        renderSection();
        showToast('Failed to connect. Using defaults.', true);
      }
    }

    // Save Content
    async function saveContent() {
      try {
        await db.collection('siteContent').doc('main').set(siteContent);
        showToast('Content saved successfully!');
      } catch (e) {
        console.error(e);
        showToast('Save failed: ' + e.message, true);
      }
    }

    // Reset to Defaults
    function resetToDefaults() {
      if (confirm('Reset all content to defaults? This cannot be undone.')) {
        siteContent = JSON.parse(JSON.stringify(DEFAULT_CONTENT));
        saveContent();
        renderSection();
      }
    }

    // Helper: get/set nested value
    function getVal(path) {
      return path.split('.').reduce((o, k) => o && o[k], siteContent);
    }
    function setVal(path, value) {
      const keys = path.split('.');
      let obj = siteContent;
      for (let i = 0; i < keys.length - 1; i++) {
        if (!obj[keys[i]]) obj[keys[i]] = {};
        obj = obj[keys[i]];
      }
      obj[keys[keys.length - 1]] = value;
    }

    // Render Helpers
    function textField(label, path, placeholder, type = 'text') {
      const val = getVal(path) || '';
      return `<div class="form-group"><label>${label}</label><input type="${type}" value="${String(val).replace(/"/g, '&quot;')}" placeholder="${placeholder || ''}" onchange="setVal('${path}', this.value)" /></div>`;
    }
    function textArea(label, path, placeholder, rows) {
      const val = getVal(path) || '';
      return `<div class="form-group"><label>${label}</label><textarea placeholder="${placeholder || ''}" rows="${rows || 3}" onchange="setVal('${path}', this.value)">${String(val).replace(/</g, '&lt;')}</textarea></div>`;
    }
    function imageField(label, path) {
      const val = getVal(path) || '';
      return `<div class="form-group"><label>${label}</label><input type="text" value="${String(val).replace(/"/g, '&quot;')}" placeholder="Image URL or filename (e.g. cow1.png)" onchange="setVal('${path}', this.value)" />${val ? `<img src="${val}" class="img-preview" onerror="this.style.display='none'" />` : ''}</div>`;
    }
    function iconField(label, path) {
      const val = getVal(path) || '';
      const isEmoji = /[\u{1F300}-\u{1FFFF}]/u.test(val);
      const isFa = val.startsWith('fa-');
      return `<div class="form-group"><label>${label} <span style="font-weight:400;text-transform:none;font-size:11px;color:#999;">(FontAwesome class like fa-star, or emoji/icon URL)</span></label><div style="display:flex;gap:8px;align-items:center;"><input type="text" value="${val}" placeholder="fa-star or 🌟 or image URL" onchange="setVal('${path}', this.value)" style="flex:1;" />${isFa ? `<i class="fas ${val}" style="font-size:24px;color:#1b5e20;"></i>` : isEmoji ? `<span style="font-size:24px;">${val}</span>` : val ? `<img src="${val}" style="width:24px;height:24px;border-radius:4px;object-fit:cover;" onerror="this.style.display='none'" />` : ''}</div></div>`;
    }
    function colorField(label, path) {
      const val = getVal(path) || '#1b5e20';
      return `<div class="form-group"><label>${label}</label><div style="display:flex;gap:8px;align-items:center;"><input type="color" class="color-input" value="${val}" onchange="setVal('${path}', this.value)" /><input type="text" value="${val}" onchange="setVal('${path}', this.value)" style="width:120px;" /></div></div>`;
    }
    function numberField(label, path) {
      const val = getVal(path) || 0;
      return `<div class="form-group"><label>${label}</label><input type="number" value="${val}" onchange="setVal('${path}', parseFloat(this.value) || 0)" /></div>`;
    }

    // Array helpers
    function addArrayItem(path, defaultItem) {
      const arr = getVal(path) || [];
      arr.push(typeof defaultItem === 'object' ? JSON.parse(JSON.stringify(defaultItem)) : defaultItem);
      setVal(path, arr);
      renderSection();
    }
    function removeArrayItem(path, index) {
      const arr = getVal(path) || [];
      arr.splice(index, 1);
      setVal(path, arr);
      renderSection();
    }
    function updateArrayItem(path, index, value) {
      const arr = getVal(path) || [];
      arr[index] = value;
      setVal(path, arr);
    }

    // Render current section
    function renderSection() {
      const area = document.getElementById('content-area');
      const renderer = SECTION_RENDERERS[currentSection];
      if (renderer) {
        area.innerHTML = renderer();
      } else {
        area.innerHTML = '<div class="card"><p>Select a section from the sidebar to edit.</p></div>';
      }
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    // Init
    loadContent();
