    /* ─── Intersection Observer Hook ─── */
    function useAnimateOnScroll(threshold = 0.15) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { el.classList.add('animated'); obs.unobserve(el); } },
          { threshold }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, [threshold]);
      return ref;
    }

    /* ─── Animated Counter ─── */
    function AnimatedCounter({ end, duration = 2000, suffix = '' }) {
      const [count, setCount] = useState(0);
      const ref = useRef(null);
      const started = useRef(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting && !started.current) {
            started.current = true;
            let startTime = null;
            const animate = (ts) => {
              if (!startTime) startTime = ts;
              const progress = Math.min((ts - startTime) / duration, 1);
              const eased = 1 - Math.pow(1 - progress, 3);
              setCount(Math.floor(eased * end));
              if (progress < 1) requestAnimationFrame(animate);
            };
            requestAnimationFrame(animate);
          }
        }, { threshold: 0.5 });
        obs.observe(el);
        return () => obs.disconnect();
      }, [end, duration]);
      return <span ref={ref}>{count.toLocaleString()}{suffix}</span>;
    }
    /* ─── Animated Number in Text ─── */
    function AnimatedTextNumber({ number, suffix, duration = 2000 }) {
      const [count, setCount] = useState(0);
      const ref = useRef(null);
      const started = useRef(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting && !started.current) {
            started.current = true;
            let startTime = null;
            const numVal = parseInt(String(number).replace(/,/g, ''), 10);
            const animate = (ts) => {
              if (!startTime) startTime = ts;
              const progress = Math.min((ts - startTime) / duration, 1);
              const eased = 1 - Math.pow(1 - progress, 3);
              setCount(Math.floor(eased * numVal));
              if (progress < 1) requestAnimationFrame(animate);
            };
            requestAnimationFrame(animate);
          }
        }, { threshold: 0.5 });
        obs.observe(el);
        return () => obs.disconnect();
      }, [number, duration]);
      return <span ref={ref} style={{ fontWeight: 'inherit', color: 'inherit' }}>{count.toLocaleString()}{suffix || ''}</span>;
    }

    function BookSection() {
      const containerRef = useRef(null);
      const [currentPage, setCurrentPage] = useState(0);
      const totalPages = 5;

      const bookPages = [
        { leftTitle: 'Our Foundation', leftText: 'Founded in 1994, Raj Agro Industries began with a vision to revolutionize cattle feed manufacturing in India. Our founder believed in science-backed nutrition for every cow.', rightTitle: 'The Beginning', rightText: 'Starting from a small manufacturing unit in Khasra, Rajasthan, we set out to create the highest quality cattle feed using modern technology and research.', leftIcon: '🏭', rightIcon: '📖' },

        { leftTitle: 'Quality Promise', leftText: 'Every bag of Nand Gopal undergoes rigorous quality testing. With ISO 9001, ISO 22000, and ISO 14001 certifications, quality is never compromised.', rightTitle: 'Innovation Hub', rightText: 'Our dedicated R&D department works continuously to develop scientifically formulated products that meet the nutritional needs of Indian cattle breeds.', leftIcon: '✅', rightIcon: '🔬' },
        { leftTitle: 'Our Products', leftText: 'From Dairy Special (By Pass) to Bull Pro, our product range covers every need of Indian dairy farmers. Each product is tailored for maximum yield.', rightTitle: 'Farmer Trust', rightText: '30+ years of unwavering trust from farmers across India. Their success stories fuel our commitment to excellence and innovation every day.', leftIcon: '🐄', rightIcon: '🤝' },
        { leftTitle: 'Future Vision', leftText: 'We envision becoming India\'s most trusted and largest cattle feed manufacturer, recognized globally for quality, innovation, and sustainable practices.', rightTitle: 'Join Our Journey', rightText: 'Be part of the Nand Gopal family. Together, we can transform Indian dairy farming and empower millions of farmers across the nation.', leftIcon: '🔭', rightIcon: '🚀' },
      ];

      useEffect(() => {
        const container = containerRef.current;
        if (!container) return;
        let ticking = false;

        const onScroll = () => {
          if (ticking) return;
          ticking = true;
          requestAnimationFrame(() => {
            const rect = container.getBoundingClientRect();
            const containerTop = rect.top;
            const containerHeight = rect.height;
            const viewportH = window.innerHeight;
            const scrollableDistance = containerHeight - viewportH;
            if (scrollableDistance <= 0) { ticking = false; return; }
            const scrolled = Math.max(0, -containerTop);
            const progress = Math.min(1, scrolled / scrollableDistance);
            const newPage = Math.min(totalPages, Math.round(progress * (totalPages + 0.5)));
            setCurrentPage(newPage);
            ticking = false;
          });
        };

        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const sectionHeight = `calc(100vh + ${totalPages * 60}vh)`;

      return (
        <div ref={containerRef} style={{ position: 'relative', height: sectionHeight }}>
          {/* Sticky book container */}
          <div style={{ position: 'sticky', top: 0, height: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(180deg, #f9fbe7 0%, #e8f5e9 50%, #f1f8e9 100%)', overflow: 'hidden', paddingTop: 10 }}>

            {/* Book */}
            <div style={{ perspective: 1200, width: '100%', maxWidth: 800, margin: '0 auto', padding: '0 16px' }}>
              <div style={{ position: 'relative', width: '100%', aspectRatio: '16/10', transformStyle: 'preserve-3d' }}>
                {/* Book Cover (background) */}
                <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(135deg, #1b5e20, #2e7d32)', borderRadius: 12, boxShadow: '0 12px 50px rgba(0,0,0,0.35), inset 0 0 30px rgba(0,0,0,0.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 0 }}>
                  <div style={{ textAlign: 'center' }}>
                    <img src="logo.png" alt="Nand Gopal" style={{ height: 60, width: 'auto', marginBottom: 8 }} />
                    <div style={{ color: '#FFD700', fontWeight: 800, fontSize: 22, letterSpacing: 2, fontFamily: "'Playfair Display', serif" }}>NAND GOPAL</div>
                    <div style={{ color: 'rgba(255,255,255,0.7)', fontSize: 13, marginTop: 4 }}>A Story of Trust & Excellence</div>
                  </div>
                </div>
                {/* Spine */}
                <div style={{ position: 'absolute', top: 0, left: '50%', width: 8, height: '100%', background: 'linear-gradient(90deg, #c8e6c9, #a5d6a7, #c8e6c9)', zIndex: 3, transform: 'translateX(-50%)', boxShadow: '0 0 8px rgba(0,0,0,0.15)' }}></div>
                {/* Pages */}
                {bookPages.map((page, i) => {
                  const isFlipped = currentPage > i;
                  return (
                    <div key={i} style={{
                      position: 'absolute', top: 0, left: '50%', width: '50%', height: '100%',
                      transformOrigin: 'left center',
                      transformStyle: 'preserve-3d',
                      transition: 'transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1)',
                      transform: isFlipped ? 'rotateY(-180deg)' : 'rotateY(0deg)',
                      zIndex: 10 + i,
                    }}>
                      {/* Front (right page) */}
                      <div style={{
                        position: 'absolute', inset: 0, backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden',
                        borderRadius: '0 12px 12px 0', display: 'flex', flexDirection: 'column',
                        justifyContent: 'center', padding: '30px 36px',

                      </div>
                      {/* Back (left page, visible when flipped) */}
                      <div style={{
                        position: 'absolute', inset: 0, backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden',
                        borderRadius: '12px 0 0 12px', display: 'flex', flexDirection: 'column',
                        justifyContent: 'center', padding: '30px 36px',
                        background: 'linear-gradient(135deg, #f1f8e9, #e8f5e9)',

                        <div style={{ marginBottom: 10 }}><img src="logo.png" alt="Nand Gopal" style={{ height: 40, width: 'auto', objectFit: 'contain' }} /></div>

                      </div>

              </p>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const { page, navigate } = useRouter();

      const renderPage = () => {
        switch (page) {
          case 'about': return <AboutPage />;
          case 'products': return <ProductsPage />;
          case 'whyus': return <WhyUsPage />;
          case 'career': return <CareerPage />;
          case 'csr': return <CSRPage />;
          case 'press': return <PressPage />;
          case 'contact': return <ContactUsPage />;
          default: return <HomePage navigate={navigate} />;
        }
      };

      return (
        <div style={{ minHeight: '100vh' }}>
          <DesktopTopBar />
          <TopBar />
          <Navbar currentPage={page} navigate={navigate} />
          <div key={page}>{renderPage()}</div>
          <Footer navigate={navigate} />
          <BackToTop />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
