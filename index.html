    /* ─── Intersection Observer Hook ─── */
    function useAnimateOnScroll(threshold = 0.15) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { el.classList.add('animated'); obs.unobserve(el); } },
          { threshold }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, [threshold]);
      return ref;
    }

    /* ─── Animated Counter ─── */
    function AnimatedCounter({ end, duration = 2000, suffix = '' }) {
      const [count, setCount] = useState(0);
      const ref = useRef(null);
      const started = useRef(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting && !started.current) {
            started.current = true;
            let startTime = null;
            const animate = (ts) => {
              if (!startTime) startTime = ts;
              const progress = Math.min((ts - startTime) / duration, 1);
              const eased = 1 - Math.pow(1 - progress, 3);
              setCount(Math.floor(eased * end));
              if (progress < 1) requestAnimationFrame(animate);
            };
            requestAnimationFrame(animate);
          }
        }, { threshold: 0.5 });
        obs.observe(el);
        return () => obs.disconnect();
      }, [end, duration]);
      return <span ref={ref}>{count.toLocaleString()}{suffix}</span>;
    }
    /* ─── Animated Number in Text ─── */
    function AnimatedTextNumber({ number, suffix, duration = 2000 }) {
      const [count, setCount] = useState(0);
      const ref = useRef(null);
      const started = useRef(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting && !started.current) {
            started.current = true;
            let startTime = null;
            const numVal = parseInt(String(number).replace(/,/g, ''), 10);
            const animate = (ts) => {
              if (!startTime) startTime = ts;
              const progress = Math.min((ts - startTime) / duration, 1);
              const eased = 1 - Math.pow(1 - progress, 3);
              setCount(Math.floor(eased * numVal));
              if (progress < 1) requestAnimationFrame(animate);
            };
            requestAnimationFrame(animate);
          }
        }, { threshold: 0.5 });
        obs.observe(el);
        return () => obs.disconnect();
      }, [number, duration]);
      return <span ref={ref} style={{ fontWeight: 'inherit', color: 'inherit' }}>{count.toLocaleString()}{suffix || ''}</span>;
    }

    /* ─── Interactive 3D Flip Book (Scroll-Controlled with Sticky) ─── */
    function BookSection({ content }) {
      const defaultPages = [
        { leftTitle: 'Our Foundation', leftText: 'Established in 1994 in Khasra, Rajasthan, Raj Agro Industries began with a vision to serve Indian farmers.', leftIcon: '🏠', leftImage: '', rightTitle: 'The Beginning', rightText: 'Our flagship brand Nand Gopal has become the most trusted name in cattle feed.', rightIcon: '🌱', rightImage: '' },
        { leftTitle: 'Growth Story', leftText: 'From a single plant to 3000 MT/day capacity, our network spans 18 states.', leftIcon: '📈', leftImage: '', rightTitle: 'Expanding Horizons', rightText: 'We serve over 1 Crore farmers every day.', rightIcon: '🌍', rightImage: '' },
        { leftTitle: 'Quality Promise', leftText: 'ISO certified. Every batch undergoes rigorous testing.', leftIcon: '⭐', leftImage: '', rightTitle: 'Innovation Hub', rightText: 'Our R&D team develops scientifically formulated products.', rightIcon: '🔬', rightImage: '' },
        { leftTitle: 'Our Products', leftText: 'From Dairy Special to Bull Pro, our range covers every need.', leftIcon: '🐂', leftImage: '', rightTitle: 'Farmer Trust', rightText: '30+ years of trust built on quality and commitment.', rightIcon: '🤝', rightImage: '' },
        { leftTitle: 'Future Vision', leftText: "To become India's largest cattle feed manufacturer.", leftIcon: '🔭', leftImage: '', rightTitle: 'Join Our Journey', rightText: 'Be part of our mission to empower Indian farmers.', rightIcon: '🚀', rightImage: '' }
      ];

      const [currentPage, setCurrentPage] = useState(0);
      const containerRef = useRef(null);
      const [inView, setInView] = useState(false);

      const rawPages = (content && content.bookPages && content.bookPages.length > 0)
        ? content.bookPages
        : defaultPages;
      const parsedPages = rawPages.map(p => {
        if (typeof p === 'string') {
          return { leftTitle: '', leftText: '', leftIcon: '', leftImage: p, rightTitle: '', rightText: '', rightIcon: '', rightImage: '' };
        }
        return p;
      });

      const sheets = useMemo(() => {
        const arr = [];
        arr.push({ front: 'cover', back: parsedPages.length > 0 ? { side: 'left', data: parsedPages[0] } : 'blank' });
        for (let i = 0; i < parsedPages.length; i++) {
          arr.push({
            front: { side: 'right', data: parsedPages[i] },
            back: i + 1 < parsedPages.length ? { side: 'left', data: parsedPages[i + 1] } : 'backCover'
          });
        }
        return arr;
      }, [parsedPages]);

      const totalPages = sheets.length;
      const [sectionHeight, setSectionHeight] = useState(totalPages * 600);

      useEffect(() => {
        if (!containerRef.current) return;
        const el = containerRef.current;
        const observer = new IntersectionObserver(([entry]) => setInView(entry.isIntersecting), { threshold: 0.1 });
        observer.observe(el);

        const sectionHeightPx = totalPages * 600;
        setSectionHeight(sectionHeightPx);

        let rafId = null;
        const onScroll = () => {
          if (rafId) return;
          rafId = requestAnimationFrame(() => {
            rafId = null;
            if (!el) return;
            const rect = el.getBoundingClientRect();
            const scrolled = -rect.top;
            const progress = Math.max(0, Math.min(1, scrolled / sectionHeightPx));
            const pageIdx = Math.min(totalPages, Math.floor(progress * (totalPages + 0.5)));
            setCurrentPage(Math.min(pageIdx, totalPages));
          });
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => { observer.disconnect(); window.removeEventListener('scroll', onScroll); };
      }, [totalPages]);

      const renderPageContent = (page, side) => {
        const hasImage = side === 'left' ? page.leftImage : page.rightImage;
        const title = side === 'left' ? page.leftTitle : page.rightTitle;
        const text = side === 'left' ? page.leftText : page.rightText;
        const icon = side === 'left' ? page.leftIcon : page.rightIcon;

        if (hasImage) {
          return (
            <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#f8f5ed', overflow: 'hidden' }}>
              <img src={hasImage} alt="Nand Gopal book page image" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
            </div>
          );
        }

        return (
          <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: 'clamp(20px, 4vw, 40px)', background: 'linear-gradient(135deg, #fdfbf7 0%, #f4eee1 100%)' }}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', gap: 16, marginBottom: 16 }}>
              <span style={{ fontSize: 'clamp(32px, 5vw, 48px)', filter: 'drop-shadow(0 4px 6px rgba(0,0,0,0.1))' }}>{icon}</span>
              <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 'clamp(18px, 2.5vw, 24px)', fontWeight: 900, color: '#3e2723', margin: 0, lineHeight: 1.3 }}>{title}</h3>
            </div>
            <div style={{ width: '40px', height: '3px', background: '#c8a96e', margin: '0 auto 20px', borderRadius: 2 }} />
            <p style={{ fontSize: 'clamp(13px, 1.8vw, 16px)', color: '#5d4037', lineHeight: 1.8, margin: 0, textAlign: 'center', fontWeight: 500 }}>{text}</p>
          </div>
        );
      };

      const renderFace = (face) => {
        if (face === 'cover') {
          return (
            <div style={{ width: '100%', height: '100%', background: 'linear-gradient(135deg, #1b5e20, #0a2e0c)', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', padding: '20px' }}>
              <div style={{ border: '2px solid rgba(255,215,0,0.4)', borderRadius: 16, padding: '30px 20px', textAlign: 'center', width: '90%', height: '90%', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', background: 'rgba(0,0,0,0.2)' }}>
                <img src="logo.png" alt="Nand Gopal" style={{ height: '80px', objectFit: 'contain', filter: 'drop-shadow(0 4px 12px rgba(255,215,0,0.4))', marginBottom: '20px' }} />
                <div style={{ fontSize: '18px', color: '#FFD700', letterSpacing: '4px', fontWeight: 800 }}>RAJ AGRO</div>
                <div style={{ fontSize: '12px', color: '#a5d6a7', letterSpacing: '2px', marginTop: '5px' }}>INDUSTRIES</div>
                <div style={{ marginTop: 'auto', color: '#fff', fontSize: '14px', fontStyle: 'italic', opacity: 0.8 }}>Scroll to open</div>
              </div>
            </div>
          );
        }
        if (face === 'backCover') {
           return (
             <div style={{ width: '100%', height: '100%', background: 'linear-gradient(135deg, #1b5e20, #0a2e0c)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
               <img src="logo.png" alt="Nand Gopal" style={{ height: '60px', opacity: 0.3, filter: 'grayscale(1)' }} />
             </div>
           );
        }
        if (face === 'blank') return <div style={{ background: '#fcfaf2', width: '100%', height: '100%' }}></div>;

        function App() {
      const { page, navigate } = useRouter();
      const [siteContent, setSiteContent] = useState(null);

      useEffect(() => {
        loadSiteContent().then(data => {
          if (data) {
            setSiteContent(data);
            // Apply dynamic data to global arrays for components that read them directly
            if (data.products && typeof products !== 'undefined') { products.length = 0; data.products.forEach(p => products.push(p)); }
            if (data.stats && typeof stats !== 'undefined') { stats.length = 0; data.stats.forEach(s => stats.push(s)); }
            if (data.stories && typeof successStories !== 'undefined') { successStories.length = 0; data.stories.forEach(s => successStories.push(s)); }
            if (data.pressReleases && typeof pressReleases !== 'undefined') { pressReleases.length = 0; data.pressReleases.forEach(p => pressReleases.push(p)); }
            if (data.careerJobs && typeof careerOpenings !== 'undefined') { careerOpenings.length = 0; data.careerJobs.forEach(j => careerOpenings.push(j)); }
            if (data.csrInitiatives && typeof csrInitiatives !== 'undefined') { csrInitiatives.length = 0; data.csrInitiatives.forEach(c => csrInitiatives.push(c)); }
          }
        });
      }, []);

      const renderPage = () => {
        switch (page) {
          case 'about': return <AboutPage content={siteContent} />;
          case 'products': return <ProductsPage content={siteContent} />;
          case 'whyus': return <WhyUsPage content={siteContent} />;
          case 'career': return <CareerPage content={siteContent} />;
          case 'csr': return <CSRPage content={siteContent} />;
          case 'press': return <PressPage content={siteContent} />;
          case 'contact': return <ContactUsPage content={siteContent} />;
          default: return <HomePage navigate={navigate} content={siteContent} />;
        }
      };

      return (
        <div style={{ minHeight: '100vh' }}>
          <DesktopTopBar content={siteContent} />
          <TopBar content={siteContent} />
          <Navbar currentPage={page} navigate={navigate} content={siteContent} />
          <div key={page}>{renderPage()}</div>
          <Footer navigate={navigate} content={siteContent} />
          <BackToTop />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
